<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320" role="img" aria-label="Jason Roschmann - Automation-Builder, ich baue komplette KI-Systeme, die in Produktion laufen">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0f1a"/>
      <stop offset="0.55" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#06090f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.8" cy="0.26" r="0.62">
      <stop offset="0" stop-color="#1f6feb" stop-opacity="0.38"/>
      <stop offset="0.5" stop-color="#1f6feb" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#1f6feb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.08" cy="0.98" r="0.75">
      <stop offset="0" stop-color="#17c0eb" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#17c0eb" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1280" height="320" fill="url(#bg)"/>
  <rect width="1280" height="320" fill="url(#glow)"/>
  <rect width="1280" height="320" fill="url(#glow2)"/>
  <rect x="0" y="0" width="1280" height="2" fill="#1f6feb" opacity="0.55"/>
  <rect x="0" y="318" width="1280" height="2" fill="#17c0eb" opacity="0.28"/>

  <!-- integrated-systems network: everything connected -->
  <g stroke="#4c8dff" stroke-opacity="0.22" stroke-width="1">
    <line x1="930" y1="90"  x2="1010" y2="150"/>
    <line x1="1010" y1="150" x2="1050" y2="60"/>
    <line x1="1050" y1="60"  x2="1160" y2="110"/>
    <line x1="1010" y1="150" x2="1120" y2="200"/>
    <line x1="1120" y1="200" x2="1160" y2="110"/>
    <line x1="1120" y1="200" x2="1180" y2="260"/>
    <line x1="900" y1="180"  x2="1010" y2="150"/>
    <line x1="900" y1="180"  x2="980"  y2="250"/>
    <line x1="980" y1="250"  x2="1120" y2="200"/>
    <line x1="980" y1="250"  x2="1080" y2="290"/>
  </g>
  <g fill="#6f9dff">
    <circle cx="930" cy="90" r="3"/>
    <circle cx="1050" cy="60" r="3"/>
    <circle cx="1160" cy="110" r="3"/>
    <circle cx="900" cy="180" r="3"/>
    <circle cx="1120" cy="200" r="3"/>
    <circle cx="1180" cy="260" r="3"/>
    <circle cx="1080" cy="290" r="3"/>
  </g>
  <g fill="#9dc1ff">
    <circle cx="1010" cy="150" r="4">
      <animate attributeName="r" values="4;7;4" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="fill-opacity" values="1;0.45;1" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1160" cy="110" r="3">
      <animate attributeName="r" values="3;6;3" dur="5s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle cx="980" cy="250" r="3">
      <animate attributeName="r" values="3;5.5;3" dur="4.5s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  <!-- a signal travelling through the system -->
  <circle r="3.4" fill="#ffffff">
    <animateMotion dur="6s" repeatCount="indefinite" path="M930,90 L1010,150 L1120,200 L1180,260"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="6s" repeatCount="indefinite"/>
  </circle>

  <!-- type -->
  <text x="80" y="112" font-family="'SFMono-Regular','Consolas','Courier New',monospace" font-size="15" letter-spacing="6" fill="#4c8dff">AUTOMATION-BUILDER &#183; KI-SYSTEME &#183; COMMERCE</text>
  <text x="78" y="184" font-family="'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif" font-size="66" font-weight="700" letter-spacing="0.5" fill="#f2f6fb">Jason Roschmann</text>
  <text x="80" y="226" font-family="'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif" font-size="21" fill="#9fb3c8">Ich baue komplette KI-Systeme, die in Produktion laufen. Allein, Ende zu Ende.</text>
  <rect x="80" y="250" width="54" height="3" fill="#4c8dff"/>
  <text x="80" y="286" font-family="'SFMono-Regular','Consolas','Courier New',monospace" font-size="15" letter-spacing="2" fill="#7d92a8">Vertriebs-DNA &#183; Hamburg &#8594; Z&#252;rich &#183; verf&#252;gbar</text>
</svg>
