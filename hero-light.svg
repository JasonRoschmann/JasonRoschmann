<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 340" width="1280" height="340" role="img" aria-label="Jason Roschmann - Automation-Builder, ich baue komplette KI-Systeme, die in Produktion laufen. Allein, Ende zu Ende.">
  <defs>
    <linearGradient id="bgl" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0" stop-color="#fbfcff"/>
      <stop offset="0.55" stop-color="#f1f5fb"/>
      <stop offset="1" stop-color="#e9eff7"/>
    </linearGradient>
    <radialGradient id="lauroraA" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#1f6feb" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#1f6feb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lauroraB" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#17c0eb" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#17c0eb" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lauroraC" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8a5cff" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#8a5cff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lnameFill" x1="0" y1="0" x2="1" y2="0.3">
      <stop offset="0" stop-color="#0b1b2e"/>
      <stop offset="1" stop-color="#274a6b"/>
    </linearGradient>
    <linearGradient id="lsheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4c8dff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#4c8dff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#4c8dff" stop-opacity="0"/>
      <animateTransform attributeName="gradientTransform" type="translate" from="-1.2 0" to="1.2 0" dur="4.5s" begin="1.2s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="lblur" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="46"/></filter>
    <filter id="lsoft" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="3.5"/></filter>
    <clipPath id="lname-clip"><text x="78" y="188" font-family="'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif" font-size="68" font-weight="700" letter-spacing="0.5">Jason Roschmann</text></clipPath>
    <style>
      @keyframes lrise { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
      @keyframes ldriftA { 0%{transform:translate(0px,0px) scale(1);} 100%{transform:translate(70px,26px) scale(1.15);} }
      @keyframes ldriftB { 0%{transform:translate(0px,0px) scale(1);} 100%{transform:translate(-54px,-30px) scale(1.1);} }
      @keyframes ldriftC { 0%{transform:translate(0px,0px) scale(1);} 100%{transform:translate(30px,-24px) scale(1.2);} }
      @keyframes lgrow  { from { transform:scaleX(0);} to { transform:scaleX(1);} }
      .lrise{opacity:0;animation:lrise .95s cubic-bezier(.16,1,.3,1) forwards;}
      .ld1{animation-delay:.10s}.ld2{animation-delay:.28s}.ld3{animation-delay:.46s}.ld4{animation-delay:.64s}
      .lbA{animation:ldriftA 17s ease-in-out infinite alternate;}
      .lbB{animation:ldriftB 21s ease-in-out infinite alternate;}
      .lbC{animation:ldriftC 15s ease-in-out infinite alternate;}
      .lrule{transform-box:fill-box;transform-origin:left center;animation:lgrow .8s cubic-bezier(.16,1,.3,1) .7s both;}
    </style>
  </defs>

  <rect width="1280" height="340" fill="url(#bgl)"/>
  <g filter="url(#lblur)">
    <ellipse class="lbA" cx="1000" cy="120" rx="230" ry="180" fill="url(#lauroraA)"/>
    <ellipse class="lbB" cx="180"  cy="330" rx="260" ry="190" fill="url(#lauroraB)"/>
    <ellipse class="lbC" cx="760"  cy="40"  rx="200" ry="150" fill="url(#lauroraC)"/>
  </g>
  <rect x="0" y="0" width="1280" height="2" fill="#1f6feb" opacity="0.5"/>
  <rect x="0" y="338" width="1280" height="2" fill="#17c0eb" opacity="0.3"/>

  <g stroke="#1f6feb" stroke-opacity="0.30" stroke-width="1.1" fill="none" stroke-linecap="round">
    <path pathLength="1" d="M930,96 L1010,156"><animate attributeName="stroke-dashoffset" values="1;0" dur="1.1s" begin="0.5s" fill="freeze"/><set attributeName="stroke-dasharray" to="1 1"/></path>
    <path pathLength="1" d="M1010,156 L1050,66"><animate attributeName="stroke-dashoffset" values="1;0" dur="1.1s" begin="0.7s" fill="freeze"/><set attributeName="stroke-dasharray" to="1 1"/></path>
    <path pathLength="1" d="M1050,66 L1160,116"><animate attributeName="stroke-dashoffset" values="1;0" dur="1.1s" begin="0.9s" fill="freeze"/><set attributeName="stroke-dasharray" to="1 1"/></path>
    <path pathLength="1" d="M1010,156 L1120,206"><animate attributeName="stroke-dashoffset" values="1;0" dur="1.1s" begin="0.8s" fill="freeze"/><set attributeName="stroke-dasharray" to="1 1"/></path>
    <path pathLength="1" d="M1120,206 L1160,116"><animate attributeName="stroke-dashoffset" values="1;0" dur="1.1s" begin="1.0s" fill="freeze"/><set attributeName="stroke-dasharray" to="1 1"/></path>
    <path pathLength="1" d="M1120,206 L1180,266"><animate attributeName="stroke-dashoffset" values="1;0" dur="1.1s" begin="1.1s" fill="freeze"/><set attributeName="stroke-dasharray" to="1 1"/></path>
    <path pathLength="1" d="M900,186 L1010,156"><animate attributeName="stroke-dashoffset" values="1;0" dur="1.1s" begin="0.6s" fill="freeze"/><set attributeName="stroke-dasharray" to="1 1"/></path>
    <path pathLength="1" d="M900,186 L980,256"><animate attributeName="stroke-dashoffset" values="1;0" dur="1.1s" begin="0.9s" fill="freeze"/><set attributeName="stroke-dasharray" to="1 1"/></path>
    <path pathLength="1" d="M980,256 L1120,206"><animate attributeName="stroke-dashoffset" values="1;0" dur="1.1s" begin="1.0s" fill="freeze"/><set attributeName="stroke-dasharray" to="1 1"/></path>
    <path pathLength="1" d="M980,256 L1080,296"><animate attributeName="stroke-dashoffset" values="1;0" dur="1.1s" begin="1.2s" fill="freeze"/><set attributeName="stroke-dasharray" to="1 1"/></path>
  </g>
  <g fill="#2f6fd0">
    <circle cx="930" cy="96" r="3"/><circle cx="1050" cy="66" r="3"/><circle cx="1160" cy="116" r="3"/>
    <circle cx="900" cy="186" r="3"/><circle cx="1120" cy="206" r="3"/><circle cx="1180" cy="266" r="3"/><circle cx="1080" cy="296" r="3"/>
  </g>
  <g fill="#1f6feb">
    <circle cx="1010" cy="156" r="4"><animate attributeName="r" values="4;7.5;4" dur="4s" repeatCount="indefinite"/><animate attributeName="fill-opacity" values="1;0.4;1" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="1160" cy="116" r="3"><animate attributeName="r" values="3;6;3" dur="5s" begin="1s" repeatCount="indefinite"/></circle>
    <circle cx="980" cy="256" r="3"><animate attributeName="r" values="3;5.5;3" dur="4.5s" begin="0.5s" repeatCount="indefinite"/></circle>
  </g>
  <circle r="7" fill="#7fb0ff" filter="url(#lsoft)" opacity="0.85"><animateMotion dur="6s" begin="1.3s" repeatCount="indefinite" path="M930,96 L1010,156 L1120,206 L1180,266"/><animate attributeName="opacity" values="0;0.85;0.85;0" dur="6s" begin="1.3s" repeatCount="indefinite"/></circle>
  <circle r="3.4" fill="#0a58ca"><animateMotion dur="6s" begin="1.3s" repeatCount="indefinite" path="M930,96 L1010,156 L1120,206 L1180,266"/><animate attributeName="opacity" values="0;1;1;0" dur="6s" begin="1.3s" repeatCount="indefinite"/></circle>

  <g transform="translate(0,2)">
    <text class="lrise ld1" x="80" y="116" font-family="'SFMono-Regular','Consolas','Courier New',monospace" font-size="15" letter-spacing="6" fill="#1f6feb">AUTOMATION-BUILDER &#183; KI-SYSTEME &#183; COMMERCE</text>
    <text class="lrise ld2" x="78" y="188" font-family="'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif" font-size="68" font-weight="700" letter-spacing="0.5" fill="url(#lnameFill)">Jason Roschmann</text>
    <rect class="lrise ld2" clip-path="url(#lname-clip)" x="60" y="130" width="1160" height="80" fill="url(#lsheen)"/>
    <text class="lrise ld3" x="80" y="230" font-family="'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif" font-size="21" fill="#40536b">Ich baue komplette KI-Systeme, die in Produktion laufen. Allein, Ende zu Ende.</text>
    <rect class="lrule" x="80" y="254" width="56" height="3" rx="1.5" fill="#1f6feb"/>
    <text class="lrise ld4" x="80" y="290" font-family="'SFMono-Regular','Consolas','Courier New',monospace" font-size="15" letter-spacing="2" fill="#6b7f95">Vertriebs-DNA &#183; Hamburg &#8594; Z&#252;rich &#183; verf&#252;gbar</text>
  </g>
</svg>
