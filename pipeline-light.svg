<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 300" width="1280" height="300" role="img" aria-label="Ein System, Ende zu Ende: Recherche, Aufbau, Freigabe-Gate, Auslieferung, Tracking und Loop">
  <defs>
    <linearGradient id="lpconn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1f6feb" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#1f6feb" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="lpshadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#1f3a66" flood-opacity="0.14"/></filter>
    <style>
      @keyframes lprise { from{opacity:0;transform:translateY(14px);} to{opacity:1;transform:translateY(0);} }
      .lcard{opacity:0;animation:lprise .7s cubic-bezier(.16,1,.3,1) forwards;}
      .lc1{animation-delay:.05s}.lc2{animation-delay:.20s}.lc3{animation-delay:.35s}.lc4{animation-delay:.50s}.lc5{animation-delay:.65s}
      .lcap{opacity:0;animation:lprise .7s ease .8s forwards;}
      .llbl{font-family:'Segoe UI','Helvetica Neue',Helvetica,Arial,sans-serif;}
      .lmono{font-family:'SFMono-Regular','Consolas','Courier New',monospace;}
    </style>
  </defs>

  <text class="lmono lcap" x="90" y="46" font-size="14" letter-spacing="5" fill="#1f6feb">EIN SYSTEM &#183; ENDE ZU ENDE</text>

  <g stroke-width="2" fill="none" stroke-linecap="round">
    <line x1="286" y1="154" x2="316" y2="154" stroke="url(#lpconn)" stroke-dasharray="4 5"><animate attributeName="stroke-dashoffset" values="18;0" dur="0.9s" repeatCount="indefinite"/></line>
    <line x1="512" y1="154" x2="542" y2="154" stroke="url(#lpconn)" stroke-dasharray="4 5"><animate attributeName="stroke-dashoffset" values="18;0" dur="0.9s" repeatCount="indefinite"/></line>
    <line x1="738" y1="154" x2="768" y2="154" stroke="url(#lpconn)" stroke-dasharray="4 5"><animate attributeName="stroke-dashoffset" values="18;0" dur="0.9s" repeatCount="indefinite"/></line>
    <line x1="964" y1="154" x2="994" y2="154" stroke="url(#lpconn)" stroke-dasharray="4 5"><animate attributeName="stroke-dashoffset" values="18;0" dur="0.9s" repeatCount="indefinite"/></line>
  </g>
  <g fill="#1f6feb">
    <polygon points="316,154 308,150 308,158"/><polygon points="542,154 534,150 534,158"/>
    <polygon points="768,154 760,150 760,158"/><polygon points="994,154 986,150 986,158"/>
  </g>

  <g class="lcard lc1">
    <rect x="90" y="96" width="196" height="116" rx="14" fill="#ffffff" stroke="#dce5f2" filter="url(#lpshadow)"/>
    <text class="lmono" x="108" y="126" font-size="12" letter-spacing="2" fill="#1f6feb">01</text>
    <circle cx="256" cy="120" r="4" fill="#1f6feb"/>
    <text class="llbl" x="108" y="160" font-size="16" font-weight="700" fill="#10233b">Recherche</text>
    <text class="llbl" x="108" y="184" font-size="12.5" fill="#55697f">Multi-Agenten,</text>
    <text class="llbl" x="108" y="200" font-size="12.5" fill="#55697f">faktengepr&#252;ft</text>
  </g>
  <g class="lcard lc2">
    <rect x="316" y="96" width="196" height="116" rx="14" fill="#ffffff" stroke="#dce5f2" filter="url(#lpshadow)"/>
    <text class="lmono" x="334" y="126" font-size="12" letter-spacing="2" fill="#1f6feb">02</text>
    <circle cx="482" cy="120" r="4" fill="#1f6feb"/>
    <text class="llbl" x="334" y="160" font-size="16" font-weight="700" fill="#10233b">Aufbau</text>
    <text class="llbl" x="334" y="184" font-size="12.5" fill="#55697f">Web &#183; Shopify</text>
    <text class="llbl" x="334" y="200" font-size="12.5" fill="#55697f">Content &#183; KI</text>
  </g>
  <g class="lcard lc3">
    <rect x="542" y="92" width="196" height="124" rx="14" fill="#f4f8ff" stroke="#1f6feb" stroke-width="1.6" filter="url(#lpshadow)"/>
    <rect x="542" y="92" width="196" height="124" rx="14" fill="none" stroke="#1f6feb" stroke-width="1.6" opacity="0.55"><animate attributeName="opacity" values="0.55;0.12;0.55" dur="2.6s" repeatCount="indefinite"/></rect>
    <text class="lmono" x="560" y="124" font-size="12" letter-spacing="2" fill="#1f6feb">03</text>
    <circle cx="708" cy="118" r="5" fill="#1f6feb"><animate attributeName="r" values="5;7;5" dur="2.6s" repeatCount="indefinite"/></circle>
    <text class="llbl" x="560" y="160" font-size="16" font-weight="700" fill="#0a1830">Freigabe-Gate</text>
    <text class="llbl" x="560" y="184" font-size="12.5" fill="#41597a">Governance,</text>
    <text class="llbl" x="560" y="200" font-size="12.5" fill="#41597a">Mensch entscheidet</text>
  </g>
  <g class="lcard lc4">
    <rect x="768" y="96" width="196" height="116" rx="14" fill="#ffffff" stroke="#dce5f2" filter="url(#lpshadow)"/>
    <text class="lmono" x="786" y="126" font-size="12" letter-spacing="2" fill="#1f6feb">04</text>
    <circle cx="934" cy="120" r="4" fill="#1f6feb"/>
    <text class="llbl" x="786" y="160" font-size="16" font-weight="700" fill="#10233b">Auslieferung</text>
    <text class="llbl" x="786" y="184" font-size="12.5" fill="#55697f">automatisiert,</text>
    <text class="llbl" x="786" y="200" font-size="12.5" fill="#55697f">gedrosselt</text>
  </g>
  <g class="lcard lc5">
    <rect x="994" y="96" width="196" height="116" rx="14" fill="#ffffff" stroke="#dce5f2" filter="url(#lpshadow)"/>
    <text class="lmono" x="1012" y="126" font-size="12" letter-spacing="2" fill="#1f6feb">05</text>
    <circle cx="1160" cy="120" r="4" fill="#1f6feb"/>
    <text class="llbl" x="1012" y="160" font-size="16" font-weight="700" fill="#10233b">Tracking &amp; Loop</text>
    <text class="llbl" x="1012" y="184" font-size="12.5" fill="#55697f">misst, lernt,</text>
    <text class="llbl" x="1012" y="200" font-size="12.5" fill="#55697f">fasst nach</text>
  </g>

  <text class="llbl lcap" x="90" y="256" font-size="14.5" fill="#5f7590">Ich spezifiziere, baue die Architektur, orchestriere die Modelle und pr&#252;fe selbst. Der Mensch bleibt das Gate.</text>
</svg>
